<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>주문 관리 | SoraSei</title>
        <link rel="stylesheet" href="./css/order-list.css" />
    </head>
    <body>
        <!--공통 헤더 로드 -->
        <div id="admin-header"></div>
        <script src="./common/js/header-loader.js"></script>

        <div class="container">
            <h1>주문 관리</h1>
            <table>
                <thead>
                    <tr>
                        <th>주문 ID</th>
                        <th>주문자명</th>
                        <th>상품명</th>
                        <th>수량</th>
                        <th>총 금액</th>
                        <th>주문일</th>
                        <th>상태</th>
                        <th>관리</th>
                    </tr>
                </thead>
                <tbody id="order-table-body">
                    <!-- JavaScript로 랜더링 -->
                </tbody>
            </table>

            <!-- 상태 변경 모달 -->
            <div id="status-modal" class="modal hidden">
                <div class="modal-content">
                    <h2>주문 상태 변경</h2>
                    <p id="status-order-id-text">주문 ID:</p>

                    <select id="status-select">
                        <option value="READY">READY / 대기중</option>
                        <option value="PENDING">PENDING / 보류중</option>
                        <option value="START">START / 배송시작</option>
                        <option value="SHIPPING">SHIPPING / 배송중</option>
                        <option value="SHIPPED">SHIPPED / 배송완료</option>
                        <option value="CANCELLED">CANCELLED / 취소</option>
                    </select>

                    <div class="modal-buttons">
                        <button id="confirm-status-btn">변경</button>
                        <button onclick="closeStatusModal()">취소</button>
                    </div>
                </div>
            </div>
        </div>

        <script src="./js/order-list.js"></script>
    </body>
</html>
