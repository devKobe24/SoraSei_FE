<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>회원 관리 | SoraSei</title>
        <link rel="stylesheet" href="./css/user-list.css" />
    </head>
    <body>
        <div id="admin-header"></div>

        <main class="container">
            <h1>회원 관리</h1>

            <!-- 🔍 검색창 -->
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="이름 또는 이메일로 검색" />
                <button id="searchBtn">검색</button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>이름</th>
                        <th>이메일</th>
                        <th>가입일</th>
                        <th>상태</th>
                        <th>관리</th>
                    </tr>
                </thead>
                <tbody id="user-table-body">
                    <!-- JS 렌더링 -->
                </tbody>
            </table>
        </main>

        <!-- 🛠️ 권한 변경 모달 -->
        <div id="role-modal" class="modal hidden">
            <div class="modal-content">
                <h2>회원 권한 변경</h2>
                <p id="role-user-name"></p>
                <select id="role-select">
                    <option value="USER">일반회원</option>
                    <option value="ADMIN">관리자</option>
                </select>
                <div class="modal-buttons">
                    <button id="confirm-role-btn">변경</button>
                    <button onclick="closeRoleModal()">취소</button>
                </div>
            </div>
        </div>

        <script src="./common/js/header-loader.js"></script>
        <script src="./js/user-list.js"></script>
    </body>
</html>
